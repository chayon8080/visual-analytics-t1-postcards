      <line x1="16" y1="30" x2="70" y2="30" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
      <line x1="16" y1="50" x2="60" y2="50" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
      <line x1="16" y1="70" x2="80" y2="70" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
